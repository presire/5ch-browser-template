name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure LIBCLANG_PATH for core-ai (bindgen)
        shell: pwsh
        run: |
          # windows-latest ships LLVM + CMake; we only need to expose libclang.dll to bindgen.
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Enable Windows long paths (llama.cpp vulkan-shaders-gen build)
        shell: pwsh
        run: |
          # llama.cpp's vulkan-shaders-gen ExternalProject builds paths that exceed
          # MAX_PATH (260 chars); MSVC cl.exe fails with C1083 without this.
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      - name: Shorten cargo target dir (MAX_PATH workaround for cl.exe)
        shell: pwsh
        run: |
          # LongPathsEnabled is not enough — MSVC cl.exe still chokes on >260 char
          # paths under D:\a\<repo>\<repo>\target\debug\build\llama-cpp-sys-2-XXX\out\build\...
          # Putting CARGO_TARGET_DIR at C:\t cuts ~70 chars and gets cmake_install.cmake
          # under the limit.
          New-Item -ItemType Directory -Force -Path C:\t | Out-Null
          echo "CARGO_TARGET_DIR=C:\t" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Vulkan SDK (core-ai GGML_VULKAN backend)
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $vk = (Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$vk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$vk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Installed Vulkan SDK at $vk"

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        working-directory: apps/desktop

      - name: Cargo check workspace
        # --jobs 1 forces serial build to dodge the llama-cpp-sys-2 vulkan-shaders-gen
        # ExternalProject install race: cmake-rs 0.1.58 only honors NUM_JOBS (not
        # CMAKE_BUILD_PARALLEL_LEVEL), and cargo's --jobs flag is what propagates
        # NUM_JOBS=1 to the build script. ~3 min slower but reliable.
        run: cargo check --workspace --jobs 1

      - name: Desktop build
        run: npm run build
        working-directory: apps/desktop

      - name: Desktop smoke UI
        run: npm run test:smoke-ui
        working-directory: apps/desktop

  rust-check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libclang-dev \
            cmake \
            libvulkan-dev \
            glslang-tools \
            glslc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/desktop

      - name: Cargo check workspace
        run: cargo check --workspace

      - name: Desktop build
        run: npm run build
        working-directory: apps/desktop

      - name: Desktop smoke UI
        run: bash scripts/run_smoke_ui.sh
        working-directory: apps/desktop

  rust-check-linux-arm64:
    # Bumped from 22.04 to 24.04 — Ubuntu 22.04 ARM doesn't have glslc and
    # LunarG's repo has no arm64 packages. 24.04 ships glslc natively.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libclang-dev \
            cmake \
            libvulkan-dev \
            glslang-tools \
            glslc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Cargo check workspace
        run: cargo check --workspace

      - name: Desktop build
        run: npm run build
        working-directory: apps/desktop

  landing-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install landing deps
        run: npm ci
        working-directory: apps/landing

      - name: Validate latest.json
        run: npm run check:latest
        working-directory: apps/landing

      - name: Landing build
        run: npm run build
        working-directory: apps/landing
