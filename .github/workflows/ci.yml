name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        working-directory: apps/desktop

      - name: Cargo check workspace
        run: cargo check --workspace

      - name: Desktop build
        run: npm run build
        working-directory: apps/desktop

      - name: Desktop smoke UI
        run: npm run test:smoke-ui
        working-directory: apps/desktop

  rust-check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/desktop

      - name: Cargo check workspace
        run: cargo check --workspace

      - name: Desktop build
        run: npm run build
        working-directory: apps/desktop

      - name: Desktop smoke UI
        run: bash scripts/run_smoke_ui.sh
        working-directory: apps/desktop

  landing-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install landing deps
        run: npm ci
        working-directory: apps/landing

      - name: Validate latest.json
        run: npm run check:latest
        working-directory: apps/landing

      - name: Landing build
        run: npm run build
        working-directory: apps/landing
