name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build
        run: npm run tauri:build
        working-directory: apps/desktop

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out
          Compress-Archive -Path target\release\ember.exe -DestinationPath out\ember-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: out/ember-win-x64.zip

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build dmg
        working-directory: apps/desktop
        run: |
          TMP_CONFIG="$(mktemp /tmp/tauri-mac-build-override.XXXXXX.json)"
          cat > "$TMP_CONFIG" <<'JSON'
          {
            "bundle": {
              "icon": ["icons/icon.png"],
              "targets": ["app", "dmg"]
            }
          }
          JSON
          npm run tauri:build -- --config "$TMP_CONFIG"
          rm -f "$TMP_CONFIG"

      - name: Package ZIP
        run: |
          mkdir -p out
          DMG_PATH="$(ls -t target/release/bundle/dmg/*_aarch64.dmg | head -n 1)"
          zip -j out/ember-mac-arm64.zip "$DMG_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: out/ember-mac-arm64.zip

  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build AppImage, deb, rpm
        working-directory: apps/desktop
        run: |
          TMP_CONFIG="$(mktemp /tmp/tauri-linux-build-override.XXXXXX.json)"
          cat > "$TMP_CONFIG" <<'JSON'
          {
            "bundle": {
              "icon": ["icons/icon.png"],
              "targets": ["appimage", "deb", "rpm"]
            }
          }
          JSON
          npm run tauri:build -- --config "$TMP_CONFIG"
          rm -f "$TMP_CONFIG"

      - name: Repack AppImage with bundled FreeType
        run: |
          sudo apt-get install -y libfuse2
          cd target/release/bundle/appimage
          APPIMAGE="$(ls *.AppImage)"
          chmod +x "$APPIMAGE"
          ./"$APPIMAGE" --appimage-extract

          # Bundle FreeType to avoid symbol mismatch with bundled WebKit2GTK
          cp /usr/lib/x86_64-linux-gnu/libfreetype.so.6* squashfs-root/usr/lib/

          # Download appimagetool and repackage
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream squashfs-root "$APPIMAGE"

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp target/release/bundle/appimage/*.AppImage out/ember_amd64.AppImage
          cp target/release/bundle/deb/*.deb out/ember_amd64.deb
          cp target/release/bundle/rpm/*.rpm out/ember_amd64.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: out/*

  build-linux-aarch64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build AppImage, deb, rpm
        working-directory: apps/desktop
        run: |
          TMP_CONFIG="$(mktemp /tmp/tauri-linux-aarch64-build-override.XXXXXX.json)"
          cat > "$TMP_CONFIG" <<'JSON'
          {
            "bundle": {
              "icon": ["icons/icon.png"],
              "targets": ["appimage", "deb", "rpm"]
            }
          }
          JSON
          npm run tauri:build -- --config "$TMP_CONFIG"
          rm -f "$TMP_CONFIG"

      - name: Repack AppImage with bundled FreeType
        run: |
          sudo apt-get install -y libfuse2
          cd target/release/bundle/appimage
          APPIMAGE="$(ls *.AppImage)"
          chmod +x "$APPIMAGE"
          ./"$APPIMAGE" --appimage-extract

          # Bundle FreeType to avoid symbol mismatch with bundled WebKit2GTK
          cp /usr/lib/aarch64-linux-gnu/libfreetype.so.6* squashfs-root/usr/lib/

          # Download appimagetool and repackage
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=aarch64 ./appimagetool --no-appstream squashfs-root "$APPIMAGE"

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp target/release/bundle/appimage/*.AppImage out/ember_aarch64.AppImage
          cp target/release/bundle/deb/*.deb out/ember_aarch64.deb
          cp target/release/bundle/rpm/*.rpm out/ember_aarch64.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: out/*

  release:
    needs: [build-windows-x64, build-macos-arm64, build-linux-x64, build-linux-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-x64/*
            artifacts/macos-arm64/*
            artifacts/linux-x64/*
            artifacts/linux-aarch64/*
