name: Release (Windows)

on:
  push:
    tags:
      - "v*-win10"
  workflow_dispatch:
    inputs:
      tag:
        description: "Target tag (e.g. v0.0.98-win10)"
        required: true

jobs:
  build-windows-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build NSIS installer
        working-directory: apps/desktop
        shell: pwsh
        run: |
          $tmpConfig = New-TemporaryFile
          @"
          {
            "bundle": {
              "icon": ["icons/icon.png", "icons/icon.ico"],
              "targets": ["nsis"]
            }
          }
          "@ | Set-Content -Path $tmpConfig
          npm run tauri:build -- --config "$tmpConfig"
          Remove-Item $tmpConfig

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force
          $nsis = Get-ChildItem -Path target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) { Copy-Item $nsis.FullName -Destination out/ember-windows-10+-x64-setup.exe }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: out/*

  attach-to-release:
    needs: [build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/windows-x64/*
