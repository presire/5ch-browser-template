          mkdir -p out
          cp target/release/bundle/appimage/*.AppImage out/ember-linux-aarch64.AppImage
          cp target/release/bundle/deb/*.deb out/ember-linux-aarch64.deb
          cp target/release/bundle/rpm/*.rpm out/ember-linux-aarch64.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: out/*

  attach-to-release:
    needs: [build-linux-x64, build-linux-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-x64/*
            artifacts/linux-aarch64/*
