          GIO_MODULES_DIR=squashfs-root/usr/lib/aarch64-linux-gnu/gio/modules
          mkdir -p "$GIO_MODULES_DIR"
          cp /usr/lib/aarch64-linux-gnu/gio/modules/libgiognutls.so "$GIO_MODULES_DIR/" 2>/dev/null \
            || echo "WARNING: libgiognutls.so not found, HTTPS image loading may fail"
          gio-querymodules "$GIO_MODULES_DIR" 2>/dev/null || true

          # Remove TLS dependency libs auto-bundled by linuxdeploy — the host
          # system's versions must be used so GnuTLS can find the distro's CA
          # trust store (bundling Ubuntu's causes "Unacceptable TLS certificate").
          rm -f squashfs-root/usr/lib/libgnutls.so.* \
               squashfs-root/usr/lib/libnettle.so.* \
               squashfs-root/usr/lib/libhogweed.so.* \
               squashfs-root/usr/lib/libp11-kit.so.* \
               squashfs-root/usr/lib/libtasn1.so.* \
               squashfs-root/usr/lib/libidn2.so.*

          # Download appimagetool and runtime (pinned to stable releases)
          wget -q "https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-aarch64.AppImage" -O appimagetool
          wget -q "https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-aarch64" -O runtime-aarch64
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=aarch64 ./appimagetool --no-appstream --runtime-file runtime-aarch64 squashfs-root "$APPIMAGE"

      - name: Verify AppImage
